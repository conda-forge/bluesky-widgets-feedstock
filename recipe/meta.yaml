{% set name = "bluesky-widgets" %}
{% set version = "0.0.18" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: d4e7238c9dcea79e31c1535901fa2b337e8dc0bdfbd7bb50f3bb2550c09b0170

build:
  number: 0
  noarch: python
  entry_points:
    - queue-monitor = bluesky_widgets.apps.queue_monitor.main:main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - bluesky-live >=0.0.7
    - numpy
    - suitcase-utils <=0.5.3

test:
  imports:
    - bluesky_widgets
    - bluesky_widgets.examples
  commands:
    - pip check
    - which queue-monitor
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/bluesky/bluesky-widgets
  summary: Toolbox of widgets for visualizing streaming data
  license: BSD-3-Clause
  license_file: LICENSE
  doc_url: https://blueskyproject.io/bluesky-widgets
  dev_url: https://github.com/bluesky/bluesky-widgets

extra:
  recipe-maintainers:
    - dmgav
    - mrakitin
    - AbbyGi
    - danielballan
